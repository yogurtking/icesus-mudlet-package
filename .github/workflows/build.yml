name: build

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate XML
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('package/Icesus.xml')"
      - name: Build package
        run: ./build/build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Icesus.mpackage
          path: dist/Icesus.mpackage
